<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Lucros | Kaique Bazil Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <style>
        .profits-container {
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .profits-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
        .profits-table th, .profits-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .profits-table th {
            background: #11141b;
            color: white;
            font-weight: 600;
        }
        .profits-table tr:hover {
            background: #f9f9f9;
        }
        .profit-positive {
            color: #27ae60;
            font-weight: bold;
        }
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, min-minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-left: 4px solid #007bff;
        }
        .card h4 {
            margin: 0;
            color: #666;
            font-size: 0.9rem;
        }
        .card p {
            margin: 10px 0 0;
            font-size: 1.5rem;
            font-weight: 800;
            color: #11141b;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <div class="logo-text">
                    <img src="img/logo.png" width="150" alt="">
                </div>
            </div>
            <h2 style="margin-left: 20px;">Painel de Margens e Lucros</h2>
        </div>
    </header>

    <div class="profits-container">
        <div class="summary-cards" id="summary-cards">
            <div class="card">
                <h4>Total de Produtos</h4>
                <p id="total-products">0</p>
            </div>
            <div class="card" style="border-left-color: #27ae60;">
                <h4>Margem Padrão</h4>
                <p>50%</p>
            </div>
        </div>

        <table class="profits-table">
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Preço Original</th>
                    <th>Preço de Venda (+50%)</th>
                    <th>Lucro Bruto</th>
                    <th>Margem</th>
                </tr>
            </thead>
            <tbody id="profits-body">
                <!-- Preenchido via JS -->
            </tbody>
        </table>
    </div>

    <script src="js/products.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const products = getProducts();
            const tbody = document.getElementById('profits-body');
            const totalEl = document.getElementById('total-products');
            
            totalEl.textContent = products.length;
            
            products.forEach(p => {
                const tr = document.createElement('tr');
                const precoOriginal = p.preco_original || (p.preco / 1.5);
                const lucro = p.preco - precoOriginal;
                const margem = ((lucro / precoOriginal) * 100).toFixed(0);

                tr.innerHTML = `
                    <td>${p.nome}</td>
                    <td>R$ ${precoOriginal.toFixed(2)}</td>
                    <td>R$ ${p.preco.toFixed(2)}</td>
                    <td class="profit-positive">R$ ${lucro.toFixed(2)}</td>
                    <td>${margem}%</td>
                `;
                tbody.appendChild(tr);
            });
        });
    </script>
</body>
</html>
